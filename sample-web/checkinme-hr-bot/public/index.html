<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CheckinMe HR Assistant</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        #chat-box {
            width: 600px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        #header {
            padding: 16px 20px;
            background: #1D9E75;
            color: white;
            font-weight: 500;
            font-size: 16px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .user {
            background: #1D9E75;
            color: white;
            align-self: flex-end;
            border-radius: 12px 4px 12px 12px;
        }

        .bot {
            background: #f0f0f0;
            color: #333;
            align-self: flex-start;
            border-radius: 4px 12px 12px 12px;
        }

        #input-row {
            padding: 12px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #eee;
        }

        #user-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: #1D9E75;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #0F6E56;
        }
    </style>
</head>

<body>
    <div id="chat-box">
        <div id="header">CheckinMe — HR Assistant</div>
        <div id="messages">
            <div class="msg bot">Hi! I'm your HR Assistant. Ask me anything about HR policies, leave, onboarding, and
                more.</div>
        </div>
        <div id="input-row">
            <input id="user-input" placeholder="Ask an HR question..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let history = [];

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const messages = document.getElementById('messages');
            const text = input.value.trim();
            if (!text) return;

            // Show user message
            messages.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            // Call backend
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, history })
            });

            const data = await res.json();
            const reply = data.reply || data.error || 'Something went wrong.';

            // Save to history for context
            history.push({ role: 'user', parts: [{ text }] });
            history.push({ role: 'model', parts: [{ text: reply }] });

            // Show bot reply
            messages.innerHTML += `<div class="msg bot">${reply}</div>`;
            messages.scrollTop = messages.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
